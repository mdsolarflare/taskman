name: Run project build & tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  ichor-build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose --manifest-path ichor/Cargo.toml
    - name: Run tests
      run: cargo test --verbose --manifest-path ichor/Cargo.toml
