name: Run project build & tests

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

env:
    CARGO_TERM_COLOR: always

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            # ─── Rust (ichor) ─────────────────────────────────────────────

            - name: Lint Rust
              run: cargo check --manifest-path ichor/Cargo.toml

            - name: Build Rust
              run: cargo build --verbose --manifest-path ichor/Cargo.toml

            - name: Test Rust
              run: cargo test --verbose --manifest-path ichor/Cargo.toml

            - name: Install wasm-pack
              run: cargo install wasm-pack

            - name: Build WASM
              run: wasm-pack build ichor --target web

            # ─── TypeScript (frontend) ────────────────────────────────────

            - uses: pnpm/action-setup@v6
              name: Install pnpm
              with:
                  version: 10
                  cache: true

            - name: Install frontend dependencies
              run: pnpm install --dir frontend

            - name: Lint TypeScript
              run: pnpm lint --dir frontend

            - name: Build TypeScript
              run: pnpm build --dir frontend

    # TODO: Step 9 — Test TypeScript
    # Once frontend tests are implemented, uncomment the following:
    #
    # - name: Test TypeScript
    #   run: pnpm test --dir frontend
