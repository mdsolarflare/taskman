name: Run project build & tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ─── Rust (ichor) ─────────────────────────────────────────────

      - name: Lint Rust
        run: cargo check --manifest-path ichor/Cargo.toml

      - name: Build Rust
        run: cargo build --verbose --manifest-path ichor/Cargo.toml

      - name: Test Rust
        run: cargo test --verbose --manifest-path ichor/Cargo.toml

      - name: Install wasm-pack
        run: cargo install wasm-pack

      #- name: Install audit
      #  run: cargo install cargo-audit
      #
      #- name: Run audit TODO manifest-path doesn't work
      #  run: cargo audit --manifest-path ichor/Cargo.toml

      - name: Build WASM
        run: wasm-pack build --release ichor --target web

      # ─── TypeScript (frontend) ────────────────────────────────────

      # Install Deno & cache remote modules automatically
      - name: Setup Deno Environment
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x # Installs the latest stable Deno release
          cache: true # Caches downloaded JSR/NPM packages based on your lockfile

      - name: Vendor WASM glue files
        run: deno task --cwd frontend vendor-wasm

      - name: Verify formatting and styles
        run: deno fmt --check frontend/

      - name: Lint TypeScript
        run: deno task --cwd frontend lint

      - name: Run Typescript Tests
        run: deno task --cwd frontend test

      - name: Build Frontend (production)
        run: deno task --cwd frontend build
