# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # ─── Rust (ichor) ─────────────────────────────────────────────

      - name: Lint Rust
        run: cargo check --manifest-path ichor/Cargo.toml

      - name: Build Rust
        run: cargo build --verbose --manifest-path ichor/Cargo.toml

      - name: Test Rust
        run: cargo test --verbose --manifest-path ichor/Cargo.toml

      - name: Install wasm-pack
        run: cargo install wasm-pack

      #- name: Install audit
      #  run: cargo install cargo-audit
      #
      #- name: Run audit TODO manifest-path doesn't work
      #  run: cargo audit --manifest-path ichor/Cargo.toml

      - name: Build WASM
        run: wasm-pack build --release ichor --target web

      # ─── TypeScript (frontend) ────────────────────────────────────

      # Install Deno & cache remote modules automatically
      - name: Setup Deno Environment
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x # Installs the latest stable Deno release
          cache: true # Caches downloaded JSR/NPM packages based on your lockfile

      - name: Vendor WASM glue files
        run: deno task --config frontend/deno.json vendor-wasm

      - name: Verify formatting and styles
        run: deno fmt --check frontend/

      - name: Lint TypeScript
        run: deno task --config frontend/deno.json lint

      - name: Run Typescript Tests
        run: deno task --config frontend/deno.json test

      - name: Build Frontend - Includes type checking
        run: deno task --config frontend/deno.json build
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: 'frontend/public'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
